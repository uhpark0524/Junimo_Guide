<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Map</title>
    <link rel="stylesheet" href="CSS/map.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css"
    />
  </head>
  <body>
    <div class="background">
      <div class="farm">
        <img class="farmimg" src="img/main 하단바.png" />
        <h1>농장</h1>
      </div>

      <a class="gotomain" href="main.html">
        <img class="gotomainimg" src="img/main 하단바.png" />
        <h1>메인</h1>
      </a>

      <div class="common">
        <img class="commonimg" src="img/기본 농장.png" />
        <h1>평범한 농장<br /><br />농지 면적이 가장 넓다.</h1>
        <img class="commonbackground" src="img/main 하단바.png" />
      </div>

      <div class="riverside">
        <img class="riversideimg" src="img/강변 농장.png" />'
        <h1>강변 농장<br /><br />강이 농장의 <br />절반을 차지한다.</h1>
        <img class="riversidebackground" src="img/main 하단바.png" />
      </div>

      <div class="forest">
        <img class="forestimg" src="img/숲속 농장.png" />
        <h1>
          삼림 농장<br /><br />숲에서 구할 수 있는<br />
          채집물이 생성된다.
        </h1>
        <img class="forestbackground" src="img/main 하단바.png" />
      </div>

      <div class="hill">
        <img class="hillimg" src="img/언덕 농장.png" />
        <h1>언덕 농장<br /><br />광물이 생성된다.</h1>
        <img class="hillbackground" src="img/main 하단바.png" />
      </div>

      <div class="fourcorners">
        <img class="fourcornersimg" src="img/네 구석 농장.png" />
        <h1>네 구석 농장<br /><br />4인 멀티용 농장이다.</h1>
        <img class="fourcornersbackground" src="img/main 하단바.png" />
      </div>

      <div class="wild">
        <img class="wildimg" src="img/몬스터 농장.png" />
        <h1>야생 농장<br /><br />밤에 몬스터가 출몰한다.</h1>
        <img class="wildbackground" src="img/main 하단바.png" />
      </div>

      <div class="seashore">
        <img class="seashoreimg" src="img/해변 농장.png" />
        <h1>
          해변 농장<br /><br />모래 위에는 스프링클러를<br />
          설치할 수 없다.
        </h1>
        <img class="seashorebackground" src="img/main 하단바.png" />
      </div>

      <div class="grassland">
        <img class="grasslandimg" src="img/목초지 농장.png" />
        <h1>
          목초지 농장<br /><br />닭장과 닭 두 마리가<br />
          제공되며 초반 퀘스트가 <br />조금 변경된다.
        </h1>
        <img class="grasslandbackground" src="img/main 하단바.png" />
      </div>

      <div class="town">
        <img class="townpageimg" src="img/마을지도.webp" />
        <img class="townbackground" src="img/pngegg.png" />
      </div>
    </div>
  </body>
</html>
